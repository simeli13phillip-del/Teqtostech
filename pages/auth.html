<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Join TeQtos - Professional Network for Global Talent">
    <title>Join TeQtos - Professional Network</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/ai-chat.css">
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex items-center justify-center relative">
    <!-- Auth Container -->
    <div class="max-w-md w-full mx-4">
        <!-- Logo -->
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-blue-400 mb-2">TeQtos</h1>
            <p class="text-gray-400">Connect. Grow. Succeed.</p>
        </div>

        <!-- Auth Tabs -->
        <div class="bg-gray-800 rounded-lg border border-gray-700 overflow-hidden">
            <div class="flex border-b border-gray-700">
                <button id="signinTab" class="flex-1 py-3 px-4 text-center text-white bg-gray-700 font-semibold">Sign In</button>
                <button id="signupTab" class="flex-1 py-3 px-4 text-center text-gray-400 hover:text-white transition">Join Now</button>
            </div>

            <!-- Sign In Form -->
            <div id="signinForm" class="p-6">
                <form class="space-y-4">
                    <div>
                        <label for="signinEmail" class="block text-sm font-medium text-gray-300 mb-1">Email or Phone</label>
                        <input type="text" id="signinEmail" class="w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:border-blue-400" placeholder="Email or phone number">
                    </div>
                    <div>
                        <label for="signinPassword" class="block text-sm font-medium text-gray-300 mb-1">Password</label>
                        <input type="password" id="signinPassword" class="w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:border-blue-400" placeholder="Password">
                    </div>
                    <div class="flex items-center justify-between">
                        <label class="flex items-center">
                            <input type="checkbox" class="mr-2 text-blue-600 bg-gray-700 border-gray-600">
                            <span class="text-sm text-gray-400">Remember me</span>
                        </label>
                        <a href="#" class="text-sm text-blue-400 hover:text-blue-300">Forgot password?</a>
                    </div>
                    <button type="submit" class="w-full bg-blue-500 text-white py-2 rounded-lg font-semibold hover:bg-blue-600 transition">
                        Sign In
                    </button>
                </form>
            </div>

            <!-- Sign Up Form -->
            <div id="signupForm" class="p-6 hidden">
                <form class="space-y-4">
                    <div>
                        <label for="firstName" class="block text-sm font-medium text-gray-300 mb-1">First Name</label>
                        <input type="text" id="firstName" class="w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:border-blue-400" placeholder="First name">
                    </div>
                    <div>
                        <label for="lastName" class="block text-sm font-medium text-gray-300 mb-1">Last Name</label>
                        <input type="text" id="lastName" class="w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:border-blue-400" placeholder="Last name">
                    </div>
                    <div>
                        <label for="signupEmail" class="block text-sm font-medium text-gray-300 mb-1">Email</label>
                        <input type="email" id="signupEmail" class="w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:border-blue-400" placeholder="Email address">
                    </div>
                    <div>
                        <label for="signupPassword" class="block text-sm font-medium text-gray-300 mb-1">Password (6+ characters)</label>
                        <input type="password" id="signupPassword" class="w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:border-blue-400" placeholder="Create password">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-3">I am here to:</label>
                        <div class="space-y-2">
                            <label class="flex items-center">
                                <input type="radio" name="accountType" value="recruiter" class="mr-3 text-blue-600 bg-gray-700 border-gray-600 focus:ring-blue-500">
                                <span class="text-gray-300">Recruit talent (I'm hiring)</span>
                            </label>
                            <label class="flex items-center">
                                <input type="radio" name="accountType" value="freelancer" class="mr-3 text-blue-600 bg-gray-700 border-gray-600 focus:ring-blue-500" checked>
                                <span class="text-gray-300">Find opportunities (I'm looking for work)</span>
                            </label>
                        </div>
                    </div>
                    <div class="text-sm text-gray-400">
                        By clicking Agree & Join, you agree to the TeQtos <a href="#" class="text-blue-400 hover:text-blue-300">User Agreement</a>, <a href="#" class="text-blue-400 hover:text-blue-300">Privacy Policy</a>, and <a href="#" class="text-blue-400 hover:text-blue-300">Cookie Policy</a>.
                    </div>
                    <button type="submit" class="w-full bg-blue-500 text-white py-2 rounded-lg font-semibold hover:bg-blue-600 transition">
                        Agree & Join
                    </button>
                </form>
            </div>
        </div>

        <!-- Social Login -->
        <div class="mt-6">
            <div class="relative">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-gray-600"></div>
                </div>
                <div class="relative flex justify-center text-sm">
                    <span class="px-2 bg-gray-900 text-gray-400">or</span>
                </div>
            </div>

            <div class="mt-6 grid grid-cols-2 gap-3">
                <button class="w-full inline-flex justify-center py-2 px-4 border border-gray-600 rounded-lg shadow-sm bg-gray-800 text-sm font-medium text-gray-300 hover:bg-gray-700 transition">
                    <svg class="w-5 h-5 mr-2" viewBox="0 0 24 24">
                        <path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Google
                </button>
                <button class="w-full inline-flex justify-center py-2 px-4 border border-gray-600 rounded-lg shadow-sm bg-gray-800 text-sm font-medium text-gray-300 hover:bg-gray-700 transition">
                    <svg class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                    </svg>
                    Facebook
                </button>
            </div>
        </div>

        <!-- Back to Home -->
        <div class="text-center mt-8">
            <a href="../index.html" class="text-blue-400 hover:text-blue-300 text-sm">← Back to Home</a>
        </div>
    </div>

    <script src="../js/auth.js"></script>
    <script src="../js/main.js"></script>    <script src="../js/ai-chat.js"></script></body>
</html>
